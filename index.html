<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Script Hub ⚡️</title>
    <style>
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* --- UI หน้าแจกสคริปต์ --- */
        .script-card { 
            background: rgba(5, 5, 5, 0.9); border: 2px solid #00ff88; border-radius: 30px; 
            width: 95%; max-width: 480px; padding: 35px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.15); display: none;
            backdrop-filter: blur(10px); margin-bottom: 50px;
        }

        .logo-text { font-size: 45px; font-weight: bold; color: #00ff88; text-shadow: 0 0 20px #00ff88; margin-bottom: 30px; letter-spacing: 3px; }

        /* หัวข้อสคริปต์ */
        .title-label { color: #888; font-size: 13px; margin-bottom: 5px; display: block; text-transform: uppercase; }

        .script-box { 
            background: #000; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; 
            color: #00ff88; font-family: 'Consolas', monospace; font-size: 13px; 
            word-break: break-all; margin: 15px 0; text-align: left; 
            border-left: 5px solid #00ff88; max-height: 200px; overflow-y: auto;
        }

        /* ปุ่มก๊อปปี้ */
        .btn-copy { 
            background: linear-gradient(45deg, #00ff88, #00bd6a); color: #000; border: none; 
            padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 18px; 
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,255,136,0.2); transition: 0.3s; margin-top: 10px;
        }
        .btn-copy span { display: block; font-size: 10px; opacity: 0.8; font-weight: normal; margin-top: 2px; }
        .btn-copy:active { transform: scale(0.96); }

        /* ปุ่มโซเชียล */
        .social-links { display: flex; gap: 10px; margin-top: 30px; width: 100%; }
        .btn-yt { flex: 1; background: #FF0000; color: #fff; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; box-shadow: 0 5px 15px rgba(255,0,0,0.2); }
        .btn-dc { flex: 1; background: #5865F2; color: #fff; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; box-shadow: 0 5px 15px rgba(88,101,242,0.2); }
        .social-sub { font-size: 9px; display: block; font-weight: normal; opacity: 0.8; margin-top: 2px; }

        /* --- UI Admin --- */
        #adminUI, #loginOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .admin-box { background: #050000; border: 2px solid #ff0000; padding: 30px; border-radius: 25px; text-align: center; width: 90%; max-width: 400px; }
        .admin-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-red { background: #ff0000; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #linkResultBox { background: #1a0000; border: 1px solid #ff0000; padding: 10px; border-radius: 10px; margin-top: 15px; display: none; text-align: left; }
        #finalLinkText { color: #fff; font-size: 11px; word-break: break-all; font-family: monospace; background: #000; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="script-card" id="userView">
        <div class="logo-text">VELOCITY</div>
        
        <span class="title-label">Script Name (ชื่อสคริปต์):</span>
        <h3 id="viewTitle" style="color:#00ff88; margin-top:0; font-size: 22px;">Loading...</h3>
        
        <div class="script-box" id="viewCode">...</div>
        
        <button class="btn-copy" id="copyBtn" onclick="copyScript()">
            COPY SCRIPT
            <span>(คัดลอกสคริปต์)</span>
        </button>

        <div class="social-links">
            <a href="https://www.youtube.com/@VelocityScript-s9v" class="btn-yt" target="_blank">
                YOUTUBE
                <span class="social-sub">(ช่องยูทูป)</span>
            </a>
            <a href="https://discord.gg/b6MpAEnTw" class="btn-dc" target="_blank">
                DISCORD
                <span class="social-sub">(เซิร์ฟเวอร์ดิสคอร์ด)</span>
            </a>
        </div>
    </div>

    <div id="adminUI">
        <div class="admin-box">
            <h2 style="color: #ff0000; margin-top:0;">ADMIN PANEL</h2>
            <input type="text" id="scriptName" class="admin-input" placeholder="ชื่อสคริปต์">
            <textarea id="scriptContent" class="admin-input" style="height: 150px; text-align:left;" placeholder="วางสคริปต์ Lua ที่นี่..."></textarea>
            <button class="btn-red" onclick="generateLink()">สร้างลิงก์ (Generate)</button>
            <div id="linkResultBox">
                <p style="color:#ff0000; font-size:11px; margin:0 0 5px 0;">คัดลอกลิงก์ด้านล่างนี้:</p>
                <div id="finalLinkText"></div>
            </div>
            <button class="btn-red" style="background:#222;" onclick="location.href=location.pathname">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="loginOverlay">
        <div class="admin-box">
            <h2 style="color:#ff0000; margin-top:0;">ADMIN LOGIN</h2>
            <input type="text" id="passInput" class="admin-input" style="-webkit-text-security: disc; text-align:center;" placeholder="ใส่รหัสผ่าน" autocomplete="off">
            <button class="btn-red" onclick="checkPass()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <p style="position: fixed; bottom: 10px; color: #111; font-size: 10px; cursor: pointer; user-select:none;" onclick="document.getElementById('loginOverlay').style.display='flex'">[ ADMIN ]</p>

    <script>
        const ADMIN_PASS = "Hacker_Safe_88";

        function init() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            if (data) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(data))));
                    document.getElementById('viewTitle').innerText = decoded.name;
                    document.getElementById('viewCode').innerText = decoded.code;
                    document.getElementById('userView').style.display = 'block';
                } catch(e) { location.href = location.pathname; }
            } else { 
                document.getElementById('userView').style.display = 'block';
                document.getElementById('viewTitle').innerText = "Welcome to Velocity";
            }
        }

        function checkPass() {
            if (document.getElementById('passInput').value === ADMIN_PASS) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminUI').style.display = 'flex';
            } else { alert("รหัสผ่านไม่ถูกต้อง!"); }
        }

        function generateLink() {
            const name = document.getElementById('scriptName').value || "Velocity Script";
            const code = document.getElementById('scriptContent').value;
            if (!code) return alert("กรุณาวางโค้ดก่อน!");
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify({name, code}))));
            const url = window.location.origin + window.location.pathname + "?data=" + encoded;
            document.getElementById('finalLinkText').innerText = url;
            document.getElementById('linkResultBox').style.display = 'block';
        }

        function copyScript() {
            navigator.clipboard.writeText(document.getElementById('viewCode').innerText);
            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = "COPIED! ✅ <span>(คัดลอกแล้ว)</span>";
            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
        }

        const canvas = document.createElement('canvas'); 
        document.getElementById('matrix').replaceWith(canvas); canvas.id = 'matrix';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#0F0'; ctx.font = '16px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
        window.onload = init;
    </script>
</body>
</html>
